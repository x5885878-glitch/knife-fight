<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>飛刀對決</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Chakra+Petch:wght@600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;touch-action:manipulation;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;background:#0b0b12;font-family:'Noto Sans TC',sans-serif}
  canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let CW=0,CH=0;

function resize(){
  const dpr=window.devicePixelRatio||1;
  CW=window.innerWidth;CH=window.innerHeight;
  if(CW<=0||CH<=0) return;
  canvas.width=CW*dpr;canvas.height=CH*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  maps=buildMaps();
}

// =============================================
//  CONFIG
// =============================================
const GRAVITY=1400;
const JUMP_VEL=-520;
const WALK_SPEED=100;
const AIM_SPEED=2.5;
const FLOOR_H=32;
const MAX_HP=2;

// Knife physics: same gravity as world.
// Max throw height should be ~70% of screen height so it always comes back down.
// v² = 2*g*h → v = sqrt(2 * 1400 * 0.7 * CH) but CH varies.
// We use a fixed speed that works well for typical screens (~350px landscape).
// v = sqrt(2 * 1400 * 220) ≈ 785 → use 340 for a moderate arc feel.
// This means straight-up throw rises ~41px (340²/2800), always lands back.
const KNIFE_THROW_SPEED = 748;

// ── SKINS ──
const SKINS=[
  {name:'忍者貓',body:'#3a3a4a',head:'#ffe0c0',accent:'#e74c3c',ear:'#ffe0c0',earInner:'#ffb0b0',eyes:'#222',blush:'rgba(255,120,120,0.35)',hat:'bandana',hatColor:'#c0392b'},
  {name:'兔兔騎士',body:'#4466aa',head:'#fff0e8',accent:'#f1c40f',ear:'#fff0e8',earInner:'#ffcccc',eyes:'#334',blush:'rgba(255,150,180,0.3)',hat:'helmet',hatColor:'#aab0c0'},
  {name:'熊熊海盜',body:'#7a5040',head:'#d4a574',accent:'#e74c3c',ear:'#d4a574',earInner:'#c08060',eyes:'#222',blush:'rgba(255,100,80,0.25)',hat:'pirate',hatColor:'#222'}
];

// ── MAPS ──
// 3 tiers of platforms, all jumpable. Max jump = 520²/(2×1400) ≈ 96px, use 85 for safety.
function buildMaps(){
  const floorTop = CH - FLOOR_H;
  const playH = floorTop * 0.75;
  const maxJump = 85;

  // 3 tiers
  let t1 = floorTop - playH * 0.22;  // low
  let t2 = floorTop - playH * 0.44;  // mid
  let t3 = floorTop - playH * 0.62;  // high

  // Clamp each gap
  if (floorTop - t1 > maxJump) t1 = floorTop - maxJump;
  if (t1 - t2 > maxJump) t2 = t1 - maxJump;
  if (t2 - t3 > maxJump) t3 = t2 - maxJump;

  const pw = (w) => w * CW;

  return [
    {
      name:'古城', bg1:'#1a1a2e', bg2:'#16213e', platColor:'#4a4a6a',
      floorColor:'#3d3d5c', accent:'#e94560', decorType:'torch',
      platforms:[
        // Tier 1 — low (5 platforms, staggered)
        {x:pw(0.02), y:t1,       w:pw(0.13), h:5},
        {x:pw(0.19), y:t1-8,     w:pw(0.10), h:5},
        {x:pw(0.44), y:t1,       w:pw(0.12), h:5},
        {x:pw(0.71), y:t1-8,     w:pw(0.10), h:5},
        {x:pw(0.85), y:t1,       w:pw(0.13), h:5},
        // Tier 2 — mid (4 platforms)
        {x:pw(0.06), y:t2,       w:pw(0.14), h:5},
        {x:pw(0.28), y:t2+6,     w:pw(0.12), h:5},
        {x:pw(0.58), y:t2+6,     w:pw(0.12), h:5},
        {x:pw(0.78), y:t2,       w:pw(0.14), h:5},
        // Tier 3 — high (3 platforms)
        {x:pw(0.14), y:t3,       w:pw(0.16), h:5},
        {x:pw(0.42), y:t3-5,     w:pw(0.16), h:5},
        {x:pw(0.70), y:t3,       w:pw(0.16), h:5},
      ]
    },
    {
      name:'火山', bg1:'#1a0a00', bg2:'#2d1500', platColor:'#6a4020',
      floorColor:'#4a2a10', accent:'#ff6b35', decorType:'lava',
      platforms:[
        // Tier 1 — asymmetric layout
        {x:pw(0.03), y:t1,       w:pw(0.11), h:5},
        {x:pw(0.18), y:t1-12,    w:pw(0.08), h:5},
        {x:pw(0.32), y:t1,       w:pw(0.14), h:5},
        {x:pw(0.54), y:t1-6,     w:pw(0.10), h:5},
        {x:pw(0.70), y:t1,       w:pw(0.08), h:5},
        {x:pw(0.84), y:t1-10,    w:pw(0.12), h:5},
        // Tier 2 — floating islands
        {x:pw(0.08), y:t2+8,     w:pw(0.10), h:5},
        {x:pw(0.24), y:t2,       w:pw(0.15), h:5},
        {x:pw(0.48), y:t2+4,     w:pw(0.12), h:5},
        {x:pw(0.68), y:t2,       w:pw(0.10), h:5},
        {x:pw(0.84), y:t2+8,     w:pw(0.10), h:5},
        // Tier 3 — narrow peaks
        {x:pw(0.16), y:t3+4,     w:pw(0.12), h:5},
        {x:pw(0.40), y:t3,       w:pw(0.20), h:5},
        {x:pw(0.72), y:t3+4,     w:pw(0.12), h:5},
      ]
    },
    {
      name:'冰原', bg1:'#0a1628', bg2:'#152238', platColor:'#5588aa',
      floorColor:'#446688', accent:'#00d4ff', decorType:'snow',
      platforms:[
        // Tier 1 — wide with small gaps
        {x:pw(0.02), y:t1,       w:pw(0.16), h:5},
        {x:pw(0.22), y:t1-6,     w:pw(0.10), h:5},
        {x:pw(0.36), y:t1,       w:pw(0.10), h:5},
        {x:pw(0.52), y:t1-6,     w:pw(0.10), h:5},
        {x:pw(0.66), y:t1,       w:pw(0.10), h:5},
        {x:pw(0.82), y:t1-6,     w:pw(0.16), h:5},
        // Tier 2 — zigzag
        {x:pw(0.04), y:t2,       w:pw(0.12), h:5},
        {x:pw(0.22), y:t2+10,    w:pw(0.14), h:5},
        {x:pw(0.44), y:t2,       w:pw(0.12), h:5},
        {x:pw(0.64), y:t2+10,    w:pw(0.14), h:5},
        {x:pw(0.84), y:t2,       w:pw(0.12), h:5},
        // Tier 3 — crown
        {x:pw(0.10), y:t3,       w:pw(0.14), h:5},
        {x:pw(0.32), y:t3-8,     w:pw(0.10), h:5},
        {x:pw(0.50), y:t3,       w:pw(0.14), h:5},
        {x:pw(0.72), y:t3-8,     w:pw(0.10), h:5},
        {x:pw(0.86), y:t3,       w:pw(0.10), h:5},
      ]
    }
  ];
}
let maps=[];
const MAPS_COUNT=3;
const P_COLORS=['#ff4455','#44aaff'];
const P_NAMES=['紅方','藍方'];

// Now safe to call resize (all constants defined)
resize();
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>{setTimeout(resize,150);});

// =============================================
//  GAME STATE
// =============================================
let gameState='menu';
let selectedSkins=[0,2];
let selectedMap=0;
let selectingPlayer=0;
let players=[];
let knives=[];
let particles=[];
let shakeTimer=0, shakeIntensity=0;
let flashAlpha=0;
let msgText='', msgTimer=0;
let koWinner=-1;
let restartTimer=0;

// =============================================
//  PLAYER
// =============================================
function createPlayer(idx){
  const floorY=CH-FLOOR_H;
  return {
    idx,
    x: idx===0 ? CW*0.15 : CW*0.85,
    y: floorY - 22,
    w:20, h:40,
    vx:0, vy:0,
    facing: idx===0 ? 1 : -1,
    onGround:true,
    skin: SKINS[selectedSkins[idx]],
    hp: MAX_HP,
    alive:true,
    hurtTimer:0,
    aimAngle:0,
    aimDir: 1,
    canThrow:true,
    throwCooldown:0,
    animFrame:0,
    deadY:0,
  };
}

function initRound(){
  maps=buildMaps();
  players=[createPlayer(0), createPlayer(1)];
  knives=[];particles=[];
  shakeTimer=0;flashAlpha=0;msgText='';msgTimer=0;
  koWinner=-1;restartTimer=0;
}
function startGame(){
  initRound();
  gameState='playing';
}

// =============================================
//  PHYSICS
// =============================================
function getPlats(){ return maps[selectedMap].platforms; }
function getFloorY(){ return CH-FLOOR_H; }

function updatePlayer(p, dt){
  if(!p.alive) return;

  // Auto walk
  p.vx = p.facing * WALK_SPEED;
  p.x += p.vx * dt;

  // Gravity
  if(!p.onGround) p.vy += GRAVITY * dt;
  p.y += p.vy * dt;

  const floorY = getFloorY();

  // Floor collision
  if(p.y + p.h/2 >= floorY){
    p.y = floorY - p.h/2;
    p.vy = 0;
    p.onGround = true;
  }

  // Platform landing (only falling down)
  if(p.vy > 0){
    for(const pl of getPlats()){
      const feet = p.y + p.h/2;
      const prevFeet = feet - p.vy * dt;
      if(prevFeet <= pl.y && feet >= pl.y &&
         p.x + p.w/2 > pl.x && p.x - p.w/2 < pl.x + pl.w){
        p.y = pl.y - p.h/2;
        p.vy = 0;
        p.onGround = true;
      }
    }
  }

  // Check if walked off platform edge
  if(p.onGround && Math.abs(p.y + p.h/2 - floorY) > 2){
    let onPlat = false;
    for(const pl of getPlats()){
      if(Math.abs(p.y + p.h/2 - pl.y) < 3 &&
         p.x + p.w/2 > pl.x && p.x - p.w/2 < pl.x + pl.w){
        onPlat = true; break;
      }
    }
    if(!onPlat) p.onGround = false;
  }

  // Wall bounce
  const margin = p.w/2 + 2;
  if(p.x < margin){ p.x = margin; p.facing = 1; }
  if(p.x > CW - margin){ p.x = CW - margin; p.facing = -1; }

  // Aim rotation
  p.aimAngle += p.aimDir * AIM_SPEED * dt;
  const maxA = 1.0;
  if(p.aimAngle > maxA){ p.aimAngle = maxA; p.aimDir = -1; }
  if(p.aimAngle < -maxA){ p.aimAngle = -maxA; p.aimDir = 1; }

  // Throw cooldown
  if(p.throwCooldown > 0){
    p.throwCooldown -= dt;
    if(p.throwCooldown <= 0) p.canThrow = true;
  }

  if(p.hurtTimer > 0) p.hurtTimer -= dt;
  p.animFrame += dt * 6;
}

function playerJump(idx){
  const p = players[idx];
  if(p && p.alive && p.onGround){
    p.vy = JUMP_VEL;
    p.onGround = false;
  }
}

// =============================================
//  KNIFE
// =============================================
function throwKnife(idx){
  const p = players[idx];
  if(!p || !p.alive || !p.canThrow) return;
  const dir = p.facing;
  const baseAngle = dir===1 ? 0 : Math.PI;
  const angle = baseAngle + p.aimAngle * dir;
  // Fixed total speed — higher angle = more vertical, less horizontal (true projectile)
  knives.push({
    x: p.x + dir*14, y: p.y - 6,
    vx: Math.cos(angle) * KNIFE_THROW_SPEED,
    vy: Math.sin(angle) * KNIFE_THROW_SPEED,
    rotation: angle,
    owner: idx,
    active: true,
    trail: [],
    timer: 0
  });
  p.canThrow = false;
  p.throwCooldown = 0.7;
}

function updateKnives(dt){
  for(let i=knives.length-1; i>=0; i--){
    const k = knives[i];
    if(!k.active){
      k.stuckTimer = (k.stuckTimer||0) + dt;
      if(k.stuckTimer > 2) knives.splice(i,1);
      continue;
    }
    k.timer += dt;
    k.vy += GRAVITY * dt;  // same gravity as world = true projectile
    k.x += k.vx * dt;
    k.y += k.vy * dt;
    k.rotation = Math.atan2(k.vy, k.vx);
    k.trail.push({x:k.x, y:k.y, life:1});
    if(k.trail.length > 8) k.trail.shift();

    // Hit opponent
    const target = players[1 - k.owner];
    if(target && target.alive){
      const dx = k.x - target.x;
      const dy = k.y - target.y;
      if(Math.abs(dx) < target.w/2+8 && Math.abs(dy) < target.h/2+6){
        k.active = false;
        hitPlayer(target, k);
        continue;
      }
    }

    // Floor
    const floorY = getFloorY();
    if(k.y > floorY){ k.active=false; k.y=floorY; spawnSparks(k.x,floorY); continue; }

    // Out of bounds (only horizontal — vertical ones will fall back)
    if(k.x<-50 || k.x>CW+50){ knives.splice(i,1); continue; }
  }
}

function hitPlayer(target, knife){
  target.hp--;
  target.hurtTimer = 0.6;
  spawnHitParticles(knife.x, knife.y);
  shakeTimer=0.3; shakeIntensity=8; flashAlpha=0.3;

  if(target.hp <= 0){
    target.alive = false;
    target.deadY = target.y;
    spawnDeathParticles(target.x, target.y);
    shakeTimer=0.5; shakeIntensity=14; flashAlpha=0.5;
    koWinner = 1 - target.idx;
    msgText = `${P_NAMES[koWinner]} 獲勝！`;
    msgTimer = 99;
    gameState = 'ko';
    restartTimer = 2.0;
  } else {
    msgText = '受傷！';
    msgTimer = 1.0;
  }
}

// =============================================
//  PARTICLES
// =============================================
function spawnHitParticles(x,y){
  const cols=['#ff4444','#ffcc00','#ffffff'];
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2, sp=2+Math.random()*6;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:1,decay:0.02+Math.random()*0.02,size:2+Math.random()*4,
      color:cols[Math.floor(Math.random()*3)]});
  }
}
function spawnDeathParticles(x,y){
  const cols=['#ff4444','#ff8800','#ffcc00','#ffffff'];
  for(let i=0;i<35;i++){
    const a=Math.random()*Math.PI*2, sp=3+Math.random()*10;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,
      life:1,decay:0.01+Math.random()*0.015,size:3+Math.random()*6,
      color:cols[Math.floor(Math.random()*4)]});
  }
  for(let i=0;i<6;i++){
    const a=Math.random()*Math.PI*2, sp=1+Math.random()*3;
    particles.push({x,y:y-20,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,
      life:1,decay:0.008,size:4,color:'#ffee44',star:true});
  }
}
function spawnSparks(x,y){
  for(let i=0;i<8;i++){
    const a=-Math.PI*Math.random(), sp=2+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:1,decay:0.04+Math.random()*0.03,size:1+Math.random()*2,color:'#ffcc66',spark:true});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy;
    if(!p.star) p.vy+=0.15;
    p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }
}

// =============================================
//  INPUT — Simultaneous multi-touch
//  Bind to document for iOS Safari compatibility
// =============================================
const activeTouches={};

document.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(CH>CW) return;
  for(const t of e.changedTouches){
    const side = t.clientX < CW/2 ? 0 : 1;
    activeTouches[t.identifier] = {startX:t.clientX, startY:t.clientY, side, moved:false};
    if(gameState==='menu'){gameState='charSelect';selectingPlayer=0;return;}
    if(gameState==='ko'){if(restartTimer<=0)gameState='menu';return;}
    if(gameState==='charSelect'){handleCharTap(t.clientX,t.clientY);return;}
    if(gameState==='mapSelect'){handleMapTap(t.clientX,t.clientY);return;}
  }
},{passive:false});

document.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const info=activeTouches[t.identifier];
    if(info && !info.moved){
      if(t.clientY - info.startY < -25){
        info.moved=true;
        if(gameState==='playing') playerJump(info.side);
      }
    }
  }
},{passive:false});

document.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const info=activeTouches[t.identifier];
    if(info && !info.moved && gameState==='playing'){
      throwKnife(info.side);
    }
    delete activeTouches[t.identifier];
  }
},{passive:false});

// Mouse fallback
let mouseInfo=null;
document.addEventListener('mousedown',e=>{
  if(CH>CW) return;
  const side=e.clientX<CW/2?0:1;
  mouseInfo={startX:e.clientX,startY:e.clientY,side,moved:false};
  if(gameState==='menu'){gameState='charSelect';selectingPlayer=0;return;}
  if(gameState==='ko'){if(restartTimer<=0)gameState='menu';return;}
  if(gameState==='charSelect'){handleCharTap(e.clientX,e.clientY);return;}
  if(gameState==='mapSelect'){handleMapTap(e.clientX,e.clientY);return;}
});
document.addEventListener('mousemove',e=>{
  if(mouseInfo && !mouseInfo.moved){
    if(e.clientY-mouseInfo.startY<-25){
      mouseInfo.moved=true;
      if(gameState==='playing') playerJump(mouseInfo.side);
    }
  }
});
document.addEventListener('mouseup',e=>{
  if(mouseInfo && !mouseInfo.moved && gameState==='playing') throwKnife(mouseInfo.side);
  mouseInfo=null;
});

// =============================================
//  SELECTION SCREENS
// =============================================
function handleCharTap(tx,ty){
  const cardW=Math.min(CW*0.20,110), gap=16;
  const totalW=SKINS.length*cardW+(SKINS.length-1)*gap;
  const startX=(CW-totalW)/2;
  const cardY=CH*0.25, cardH=CH*0.48;
  for(let i=0;i<SKINS.length;i++){
    const cx=startX+i*(cardW+gap);
    if(tx>=cx&&tx<=cx+cardW&&ty>=cardY&&ty<=cardY+cardH){
      selectedSkins[selectingPlayer]=i;
      if(selectingPlayer===0) selectingPlayer=1;
      else gameState='mapSelect';
      return;
    }
  }
}
function handleMapTap(tx,ty){
  maps=buildMaps();
  const cardW=Math.min(CW*0.25,140), gap=16;
  const totalW=MAPS_COUNT*cardW+(MAPS_COUNT-1)*gap;
  const startX=(CW-totalW)/2;
  const cardY=CH*0.25, cardH=CH*0.48;
  for(let i=0;i<MAPS_COUNT;i++){
    const cx=startX+i*(cardW+gap);
    if(tx>=cx&&tx<=cx+cardW&&ty>=cardY&&ty<=cardY+cardH){
      selectedMap=i;
      startGame();
      return;
    }
  }
}

// =============================================
//  DRAWING — Q-VERSION CHARACTER
// =============================================
function drawQChar(p){
  const x=p.x, y=p.y, dir=p.facing, skin=p.skin;
  const walk = p.onGround ? Math.sin(p.animFrame)*0.25 : 0;
  const hurt = p.hurtTimer>0 && Math.sin(p.hurtTimer*30)>0;

  ctx.save();
  ctx.translate(x,y);
  if(hurt) ctx.globalAlpha=0.5;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.ellipse(0,p.h/2-2,11,3,0,0,Math.PI*2);ctx.fill();

  // Legs
  ctx.fillStyle=skin.body;
  const lo=walk*5;
  rr(-8+lo,10,7,12,3);ctx.fill();
  rr(1-lo,10,7,12,3);ctx.fill();
  ctx.fillStyle=shade(skin.body,-30);
  rr(-9+lo,18,9,5,2);ctx.fill();
  rr(0-lo,18,9,5,2);ctx.fill();

  // Body
  ctx.fillStyle=skin.body;
  ctx.beginPath();ctx.ellipse(0,0,13,15,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=skin.accent;
  ctx.fillRect(-13,-2,26,4);

  // Arms
  const as=walk*4;
  ctx.fillStyle=skin.body;
  ctx.save();ctx.translate(-dir*9,-5);ctx.rotate(-dir*0.3+as*dir);
  rr(-3,-2,6,13,3);ctx.fill();ctx.restore();
  ctx.save();ctx.translate(dir*9,-5);ctx.rotate(dir*0.2-as*dir);
  rr(-3,-2,6,13,3);ctx.fill();ctx.restore();

  // Head
  const headY=-20, headR=14;

  // Ears
  ctx.fillStyle=skin.ear;
  if(skin.hat==='bandana'){
    // Cat ears
    ctx.beginPath();ctx.moveTo(-9,headY-12);ctx.lineTo(-14,headY-26);ctx.lineTo(-2,headY-16);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(9,headY-12);ctx.lineTo(14,headY-26);ctx.lineTo(2,headY-16);ctx.closePath();ctx.fill();
    ctx.fillStyle=skin.earInner;
    ctx.beginPath();ctx.moveTo(-8,headY-13);ctx.lineTo(-12,headY-23);ctx.lineTo(-4,headY-16);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(8,headY-13);ctx.lineTo(12,headY-23);ctx.lineTo(4,headY-16);ctx.closePath();ctx.fill();
  } else if(skin.hat==='helmet'){
    // Bunny ears
    ctx.save();ctx.translate(-7,headY-18);ctx.rotate(-0.12);
    ctx.beginPath();ctx.ellipse(0,0,4.5,14,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=skin.earInner;ctx.beginPath();ctx.ellipse(0,0,2.5,10,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.fillStyle=skin.ear;
    ctx.save();ctx.translate(7,headY-18);ctx.rotate(0.12);
    ctx.beginPath();ctx.ellipse(0,0,4.5,14,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=skin.earInner;ctx.beginPath();ctx.ellipse(0,0,2.5,10,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  } else {
    // Bear ears
    ctx.beginPath();ctx.arc(-10,headY-11,5.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(10,headY-11,5.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=skin.earInner;
    ctx.beginPath();ctx.arc(-10,headY-11,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(10,headY-11,3,0,Math.PI*2);ctx.fill();
  }

  // Head circle
  ctx.fillStyle=skin.head;
  ctx.beginPath();ctx.arc(0,headY,headR,0,Math.PI*2);ctx.fill();

  // Hat
  if(skin.hat==='bandana'){
    ctx.fillStyle=skin.hatColor;
    ctx.beginPath();
    ctx.moveTo(-headR-1,headY-3);ctx.lineTo(headR+1,headY-3);
    ctx.lineTo(headR,headY-8);ctx.lineTo(-headR,headY-8);ctx.closePath();ctx.fill();
    ctx.strokeStyle=skin.hatColor;ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(-dir*headR,headY-5.5);
    ctx.quadraticCurveTo(-dir*(headR+10),headY-1,-dir*(headR+13),headY-8);
    ctx.stroke();
  } else if(skin.hat==='helmet'){
    ctx.fillStyle=skin.hatColor;
    ctx.beginPath();ctx.arc(0,headY-1,headR+1.5,Math.PI,0);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(-headR,headY-3,headR*2,4);
    ctx.fillStyle=skin.accent;
    ctx.beginPath();ctx.ellipse(0,headY-headR-3,2.5,6,0,0,Math.PI*2);ctx.fill();
  } else {
    ctx.fillStyle=skin.hatColor;
    ctx.beginPath();
    ctx.moveTo(-headR-3,headY-5);ctx.quadraticCurveTo(0,headY-26,headR+3,headY-5);
    ctx.lineTo(headR+5,headY-3);ctx.lineTo(-headR-5,headY-3);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,headY-14,3.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(-1.3,headY-14.5,0.8,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(1.3,headY-14.5,0.8,0,Math.PI*2);ctx.fill();
  }

  // Eyes
  const ex=dir*3.5;
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(ex-3.5,headY-1,4,4.5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(ex+4.5,headY-1,4,4.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=skin.eyes;
  ctx.beginPath();ctx.arc(ex-3+dir,headY-0.5,2.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(ex+5+dir,headY-0.5,2.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(ex-2+dir,headY-2,1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(ex+6+dir,headY-2,1,0,Math.PI*2);ctx.fill();

  // Mouth
  ctx.strokeStyle=skin.eyes;ctx.lineWidth=1.3;ctx.lineCap='round';
  if(p.hp<MAX_HP){
    ctx.beginPath();ctx.moveTo(ex-2,headY+6);ctx.lineTo(ex,headY+4.5);ctx.lineTo(ex+2,headY+6);ctx.lineTo(ex+4,headY+4.5);ctx.stroke();
  } else {
    ctx.beginPath();ctx.arc(ex+0.5,headY+3.5,2.5,0.1,Math.PI-0.1);ctx.stroke();
  }

  // Blush
  ctx.fillStyle=skin.blush;
  ctx.beginPath();ctx.ellipse(ex-7,headY+1.5,3.5,2,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(ex+9,headY+1.5,3.5,2,0,0,Math.PI*2);ctx.fill();

  // HP bar above head
  const hpBarY = headY - headR - 18;
  ctx.fillStyle='rgba(0,0,0,0.4)';rr(-12,hpBarY,24,5,2);ctx.fill();
  const hpW=20*(p.hp/MAX_HP);
  ctx.fillStyle=p.hp>=2?'#44dd44':'#ffaa00';
  rr(-10,hpBarY+1,hpW,3,1.5);ctx.fill();

  // P label
  ctx.font='bold 8px Chakra Petch,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=P_COLORS[p.idx];
  ctx.fillText(P_NAMES[p.idx],0,hpBarY-6);

  // Bandage if hurt
  if(p.hp<MAX_HP && p.alive){
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-4,headY+headR-5);ctx.lineTo(5,headY-headR+3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-1,headY+headR-3);ctx.lineTo(3,headY-headR+5);ctx.stroke();
  }

  ctx.globalAlpha=1;
  ctx.restore();
}

function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function shade(col,amt){
  let r=parseInt(col.slice(1,3),16)+amt;
  let g=parseInt(col.slice(3,5),16)+amt;
  let b=parseInt(col.slice(5,7),16)+amt;
  return `rgb(${Math.max(0,Math.min(255,r))},${Math.max(0,Math.min(255,g))},${Math.max(0,Math.min(255,b))})`;
}

function drawDeadChar(p){
  ctx.save();ctx.translate(p.x,p.deadY);ctx.globalAlpha=0.4;ctx.rotate(Math.PI/2);ctx.scale(0.7,0.7);
  ctx.fillStyle=p.skin.body;ctx.beginPath();ctx.ellipse(0,0,13,15,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=p.skin.head;ctx.beginPath();ctx.arc(0,-20,14,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#222';ctx.lineWidth=1.8;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-5,-22);ctx.lineTo(-1,-18);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-1,-22);ctx.lineTo(-5,-18);ctx.stroke();
  ctx.beginPath();ctx.moveTo(1,-22);ctx.lineTo(5,-18);ctx.stroke();
  ctx.beginPath();ctx.moveTo(5,-22);ctx.lineTo(1,-18);ctx.stroke();
  ctx.globalAlpha=1;ctx.restore();
}

function drawAim(p){
  if(!p.alive || !p.canThrow) return;
  const dir=p.facing, base=dir===1?0:Math.PI;
  const angle=base+p.aimAngle*dir;
  const len=40;
  const sx=p.x+dir*14, sy=p.y-6;

  ctx.setLineDash([4,4]);
  ctx.strokeStyle=P_COLORS[p.idx];ctx.lineWidth=2;
  ctx.shadowColor=P_COLORS[p.idx];ctx.shadowBlur=6;
  ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+Math.cos(angle)*len,sy+Math.sin(angle)*len);ctx.stroke();
  ctx.setLineDash([]);

  const tx2=sx+Math.cos(angle)*len, ty2=sy+Math.sin(angle)*len;
  ctx.fillStyle=P_COLORS[p.idx];
  ctx.beginPath();
  ctx.moveTo(tx2+Math.cos(angle)*6,ty2+Math.sin(angle)*6);
  ctx.lineTo(tx2+Math.cos(angle+2.4)*5,ty2+Math.sin(angle+2.4)*5);
  ctx.lineTo(tx2+Math.cos(angle-2.4)*5,ty2+Math.sin(angle-2.4)*5);
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
}

function drawKnifeObj(k){
  ctx.save();ctx.translate(k.x,k.y);ctx.rotate(k.rotation);
  const g=ctx.createLinearGradient(-4,0,16,0);g.addColorStop(0,'#bbb');g.addColorStop(1,'#fff');
  ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(16,0);ctx.lineTo(-4,-3.5);ctx.lineTo(-4,3.5);ctx.closePath();ctx.fill();
  ctx.fillStyle='#8B4513';ctx.fillRect(-12,-2.5,10,5);
  ctx.restore();
}

function drawMap(){
  const map=maps[selectedMap];
  const g=ctx.createLinearGradient(0,0,0,CH);g.addColorStop(0,map.bg1);g.addColorStop(1,map.bg2);
  ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);

  ctx.strokeStyle='rgba(255,255,255,0.02)';ctx.lineWidth=1;
  for(let x=0;x<CW;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  for(let y=0;y<CH;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}

  const t=performance.now()/1000;
  if(map.decorType==='lava'){
    for(let i=0;i<5;i++){
      ctx.fillStyle=`rgba(255,100,50,${0.2+Math.sin(t*2+i)*0.12})`;
      ctx.beginPath();ctx.arc((i/5+t*0.01)%1*CW,CH-FLOOR_H-2,Math.max(1,2+Math.sin(t+i)),0,Math.PI*2);ctx.fill();
    }
  } else if(map.decorType==='snow'){
    for(let i=0;i<10;i++){
      ctx.fillStyle=`rgba(200,230,255,${0.08+Math.sin(t+i*0.7)*0.06})`;
      ctx.beginPath();ctx.arc((i*83.7+t*12)%CW,(i*47.3+t*20)%CH,1,0,Math.PI*2);ctx.fill();
    }
  }

  // Floor
  ctx.fillStyle=map.floorColor;ctx.fillRect(0,CH-FLOOR_H,CW,FLOOR_H);
  ctx.fillStyle=map.accent;ctx.fillRect(0,CH-FLOOR_H,CW,2);

  // Platforms
  for(const pl of getPlats()){
    ctx.fillStyle=map.platColor;
    ctx.beginPath();
    const r=3;
    ctx.moveTo(pl.x+r,pl.y);ctx.lineTo(pl.x+pl.w-r,pl.y);
    ctx.quadraticCurveTo(pl.x+pl.w,pl.y,pl.x+pl.w,pl.y+r);
    ctx.lineTo(pl.x+pl.w,pl.y+pl.h);ctx.lineTo(pl.x,pl.y+pl.h);
    ctx.lineTo(pl.x,pl.y+r);ctx.quadraticCurveTo(pl.x,pl.y,pl.x+r,pl.y);
    ctx.closePath();ctx.fill();
    ctx.fillStyle=map.accent;ctx.fillRect(pl.x+2,pl.y,pl.w-4,1.5);
  }

  // Center divider
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;ctx.setLineDash([3,5]);
  ctx.beginPath();ctx.moveTo(CW/2,8);ctx.lineTo(CW/2,CH-FLOOR_H-8);ctx.stroke();
  ctx.setLineDash([]);
}

function drawHUD(){
  const sz=Math.min(CW*0.028,16);
  ctx.font=`700 ${sz}px Chakra Petch,sans-serif`;

  // P1 left
  ctx.textAlign='left';ctx.fillStyle=P_COLORS[0];
  ctx.shadowColor=P_COLORS[0];ctx.shadowBlur=4;
  ctx.fillText(P_NAMES[0],8,sz+4);ctx.shadowBlur=0;
  for(let i=0;i<MAX_HP;i++) drawHeart(32+i*16,sz/2+2,i<players[0].hp?'#ff4455':'#333',6);

  // P2 right
  ctx.textAlign='right';ctx.fillStyle=P_COLORS[1];
  ctx.shadowColor=P_COLORS[1];ctx.shadowBlur=4;
  ctx.fillText(P_NAMES[1],CW-8,sz+4);ctx.shadowBlur=0;
  for(let i=0;i<MAX_HP;i++) drawHeart(CW-34-i*16,sz/2+2,i<players[1].hp?'#44aaff':'#333',6);

  // Hint
  ctx.textAlign='center';
  ctx.font=`400 ${Math.min(9,CW*0.015)}px Noto Sans TC,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillText('↑滑跳躍 · 點擊投刀 · 左半紅方 / 右半藍方',CW/2,CH-5);
}

function drawHeart(cx,cy,color,s){
  ctx.fillStyle=color;ctx.beginPath();
  ctx.moveTo(cx,cy+s*0.3);
  ctx.bezierCurveTo(cx-s,cy-s*0.5,cx-s*0.3,cy-s,cx,cy-s*0.4);
  ctx.bezierCurveTo(cx+s*0.3,cy-s,cx+s,cy-s*0.5,cx,cy+s*0.3);
  ctx.fill();
}

function drawMsg(){
  if(msgTimer<=0) return;
  const a=Math.min(msgTimer/0.3,1);
  ctx.save();ctx.globalAlpha=Math.min(a,1);
  ctx.translate(CW/2,CH*0.3);ctx.scale(1+(1-a)*0.12,1+(1-a)*0.12);
  ctx.font=`900 ${Math.min(CW*0.05,28)}px Noto Sans TC,sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=10;
  ctx.fillText(msgText,0,0);ctx.shadowBlur=0;
  ctx.restore();
}

function drawCharSelect(){
  const g=ctx.createRadialGradient(CW/2,CH/2,0,CW/2,CH/2,Math.max(CW,CH)*0.6);
  g.addColorStop(0,'#1a1a2e');g.addColorStop(1,'#0b0b12');
  ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);
  ctx.textAlign='center';ctx.textBaseline='middle';
  const pc=P_COLORS[selectingPlayer];
  ctx.font=`700 ${Math.min(CW*0.032,18)}px Noto Sans TC,sans-serif`;
  ctx.fillStyle=pc;ctx.shadowColor=pc;ctx.shadowBlur=6;
  ctx.fillText(`${P_NAMES[selectingPlayer]} 選擇角色`,CW/2,CH*0.12);ctx.shadowBlur=0;

  const cardW=Math.min(CW*0.20,110),gap=16;
  const totalW=SKINS.length*cardW+(SKINS.length-1)*gap;
  const startX=(CW-totalW)/2;
  const cardY=CH*0.25,cardH=CH*0.48;

  for(let i=0;i<SKINS.length;i++){
    const cx=startX+i*(cardW+gap), skin=SKINS[i];
    ctx.fillStyle='rgba(255,255,255,0.04)';ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(cx,cardY,cardW,cardH,8);ctx.fill();ctx.stroke();

    // Mini character
    const px=cx+cardW/2, py=cardY+cardH*0.45;
    ctx.save();ctx.translate(px,py);ctx.scale(0.85,0.85);
    ctx.fillStyle=skin.head;ctx.beginPath();ctx.arc(0,-10,12,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=skin.body;ctx.beginPath();ctx.ellipse(0,10,10,12,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=skin.accent;ctx.fillRect(-10,8,20,3);
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(-3,-11,3,3.5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(5,-11,3,3.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=skin.eyes;
    ctx.beginPath();ctx.arc(-2,-10.5,1.8,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(6,-10.5,1.8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=skin.blush;
    ctx.beginPath();ctx.ellipse(-8,-8,3,1.8,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(8,-8,3,1.8,0,0,Math.PI*2);ctx.fill();
    if(skin.hat==='bandana'){
      ctx.fillStyle=skin.ear;
      ctx.beginPath();ctx.moveTo(-8,-18);ctx.lineTo(-12,-30);ctx.lineTo(-2,-20);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(8,-18);ctx.lineTo(12,-30);ctx.lineTo(2,-20);ctx.closePath();ctx.fill();
    } else if(skin.hat==='helmet'){
      ctx.fillStyle=skin.ear;
      ctx.save();ctx.translate(-5,-22);ctx.rotate(-0.1);ctx.beginPath();ctx.ellipse(0,0,4,12,0,0,Math.PI*2);ctx.fill();ctx.restore();
      ctx.save();ctx.translate(5,-22);ctx.rotate(0.1);ctx.beginPath();ctx.ellipse(0,0,4,12,0,0,Math.PI*2);ctx.fill();ctx.restore();
    } else {
      ctx.fillStyle=skin.ear;
      ctx.beginPath();ctx.arc(-8,-18,5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(8,-18,5,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
    ctx.font=`700 ${Math.min(CW*0.02,12)}px Noto Sans TC,sans-serif`;
    ctx.fillStyle='#fff';ctx.fillText(skin.name,cx+cardW/2,cardY+cardH-10);
  }
  ctx.textBaseline='alphabetic';
}

function drawMapSelect(){
  maps=buildMaps();
  const g=ctx.createRadialGradient(CW/2,CH/2,0,CW/2,CH/2,Math.max(CW,CH)*0.6);
  g.addColorStop(0,'#1a1a2e');g.addColorStop(1,'#0b0b12');
  ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=`700 ${Math.min(CW*0.032,18)}px Noto Sans TC,sans-serif`;
  ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=6;
  ctx.fillText('選擇地圖',CW/2,CH*0.12);ctx.shadowBlur=0;

  const cardW=Math.min(CW*0.25,140),gap=16;
  const totalW=MAPS_COUNT*cardW+(MAPS_COUNT-1)*gap;
  const startX=(CW-totalW)/2;
  const cardY=CH*0.25,cardH=CH*0.48;

  for(let i=0;i<MAPS_COUNT;i++){
    const cx=startX+i*(cardW+gap),map=maps[i];
    const mg=ctx.createLinearGradient(cx,cardY,cx,cardY+cardH);mg.addColorStop(0,map.bg1);mg.addColorStop(1,map.bg2);
    ctx.fillStyle=mg;ctx.beginPath();ctx.roundRect(cx,cardY,cardW,cardH,8);ctx.fill();
    ctx.strokeStyle=map.accent;ctx.lineWidth=1.5;ctx.stroke();
    const sx2=cardW/CW,sy2=cardH/CH;
    for(const pl of map.platforms){
      ctx.fillStyle=map.platColor;ctx.fillRect(cx+pl.x*sx2,cardY+pl.y*sy2,Math.max(4,pl.w*sx2),2);
      ctx.fillStyle=map.accent;ctx.fillRect(cx+pl.x*sx2,cardY+pl.y*sy2,Math.max(4,pl.w*sx2),1);
    }
    ctx.fillStyle=map.floorColor;ctx.fillRect(cx+2,cardY+cardH-7,cardW-4,5);
    ctx.font=`700 ${Math.min(CW*0.02,12)}px Noto Sans TC,sans-serif`;
    ctx.fillStyle='#fff';ctx.fillText(map.name,cx+cardW/2,cardY+cardH+14);
  }
  ctx.textBaseline='alphabetic';
}

function drawStar(cx,cy,r,color){
  ctx.fillStyle=color;ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=Math.PI*2*i/5-Math.PI/2, a2=a+Math.PI/5;
    ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    ctx.lineTo(cx+Math.cos(a2)*r*0.4,cy+Math.sin(a2)*r*0.4);
  }
  ctx.closePath();ctx.fill();
}

// =============================================
//  MAIN LOOP
// =============================================
let prevTime=performance.now();

function loop(now){
  const dt=Math.min((now-prevTime)/1000,0.05);
  prevTime=now;
  CW=window.innerWidth;CH=window.innerHeight;

  if(gameState==='playing'){
    for(const p of players) updatePlayer(p,dt);
    updateKnives(dt);
    updateParticles(dt);
    if(shakeTimer>0) shakeTimer-=dt;
    if(flashAlpha>0) flashAlpha-=dt*1.5;
    if(msgTimer>0 && msgTimer<90) msgTimer-=dt;
    for(const k of knives) for(const tr of k.trail) tr.life-=0.1;
  }
  if(gameState==='ko'){
    updateParticles(dt);
    if(shakeTimer>0) shakeTimer-=dt;
    if(flashAlpha>0) flashAlpha-=dt*1.2;
    if(restartTimer>0) restartTimer-=dt;
  }

  // If portrait, just draw rotate hint on canvas
  if(CH > CW){
    ctx.fillStyle='#0b0b12';ctx.fillRect(0,0,CW,CH);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='50px sans-serif';ctx.fillStyle='#fff';
    ctx.fillText('📱',CW/2,CH/2-30);
    ctx.font='bold 16px Noto Sans TC,sans-serif';ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.fillText('請橫放手機開始遊戲',CW/2,CH/2+25);
    requestAnimationFrame(loop);return;
  }

  ctx.save();
  if(shakeTimer>0) ctx.translate((Math.random()-0.5)*shakeIntensity*2,(Math.random()-0.5)*shakeIntensity*2);

  if(gameState==='menu') drawMenuScreen();
  else if(gameState==='charSelect') drawCharSelect();
  else if(gameState==='mapSelect') drawMapSelect();
  else if(gameState==='playing'||gameState==='ko'){
    drawMap();
    for(const k of knives){ if(!k.active) drawKnifeObj(k); }
    for(const p of players){ if(p.alive) drawQChar(p); else drawDeadChar(p); }
    if(gameState==='playing') for(const p of players) drawAim(p);
    for(const k of knives){
      if(k.active){
        for(const tr of k.trail){
          if(tr.life>0){
            ctx.fillStyle=`rgba(255,200,100,${Math.max(0,tr.life)*0.4})`;
            ctx.beginPath();ctx.arc(tr.x,tr.y,Math.max(0.1,2*tr.life),0,Math.PI*2);ctx.fill();
          }
        }
        drawKnifeObj(k);
      }
    }
    for(const p of particles){
      ctx.globalAlpha=Math.max(0,p.life);
      if(p.spark){
        ctx.strokeStyle=p.color;ctx.lineWidth=p.size;ctx.beginPath();
        ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.vx*2,p.y-p.vy*2);ctx.stroke();
      } else if(p.star){
        drawStar(p.x,p.y,Math.max(0.1,p.size),p.color);
      } else {
        ctx.fillStyle=p.color;ctx.beginPath();
        ctx.arc(p.x,p.y,Math.max(0.1,p.size*p.life),0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
    }
    if(flashAlpha>0){ctx.fillStyle=`rgba(255,255,255,${Math.max(0,flashAlpha)})`;ctx.fillRect(0,0,CW,CH);}
    drawHUD();drawMsg();
    if(gameState==='ko') drawKOScreen();
  }
  ctx.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
