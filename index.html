<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>飛刀對決</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Chakra+Petch:wght@600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;touch-action:manipulation;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;background:#0b0b12;font-family:'Noto Sans TC',sans-serif}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let CW=0,CH=0;
function resize(){const d=window.devicePixelRatio||1;CW=window.innerWidth;CH=window.innerHeight;if(CW<=0||CH<=0)return;canvas.width=CW*d;canvas.height=CH*d;ctx.setTransform(d,0,0,d,0,0);maps=buildMaps();}
const GRAVITY=1400,JUMP_VEL=-520,WALK_SPEED=120,AIM_SPEED=2.42,FLOOR_H=32,MAX_HP=6;
const AIM_MAX=1.571,AIM_MIN=-2.094;
const WEAPONS=[{name:'飛刀',icon:'🗡️',speed:748,damage:2,cooldown:0.7,gravity:1,spin:true,explosive:false,color:'#ccc'},{name:'炸彈',icon:'💣',speed:600,damage:1,cooldown:0.9,gravity:1.2,spin:false,explosive:true,fuseTime:1.8,blastRadius:80,color:'#ff6600'},{name:'標槍',icon:'🔱',speed:972,damage:3,cooldown:1.4,gravity:0.7,spin:false,explosive:false,color:'#88ccff'}];
const SKINS=[{name:'忍者貓',body:'#3a3a4a',head:'#ffe0c0',accent:'#e74c3c',ear:'#ffe0c0',earInner:'#ffb0b0',eyes:'#222',blush:'rgba(255,120,120,0.35)',hat:'bandana',hatColor:'#c0392b'},{name:'兔兔騎士',body:'#4466aa',head:'#fff0e8',accent:'#f1c40f',ear:'#fff0e8',earInner:'#ffcccc',eyes:'#334',blush:'rgba(255,150,180,0.3)',hat:'helmet',hatColor:'#aab0c0'},{name:'熊熊海盜',body:'#7a5040',head:'#d4a574',accent:'#e74c3c',ear:'#d4a574',earInner:'#c08060',eyes:'#222',blush:'rgba(255,100,80,0.25)',hat:'pirate',hatColor:'#222'}];
function buildMaps(){const ft=CH-FLOOR_H,pH=ft*0.75,mj=85;let t1=ft-pH*0.25,t2=ft-pH*0.48;if(ft-t1>mj)t1=ft-mj;if(t1-t2>mj)t2=t1-mj;const p=w=>w*CW;return[
{name:'古城',bg1:'#1a1a2e',bg2:'#16213e',platColor:'#4a4a6a',floorColor:'#3d3d5c',accent:'#e94560',decorType:'castle',platforms:[{x:p(.03),y:t1,w:p(.15),h:5},{x:p(.30),y:t1-10,w:p(.08),h:5},{x:p(.55),y:t1+5,w:p(.18),h:5},{x:p(.82),y:t1-6,w:p(.14),h:5},{x:p(.10),y:t2,w:p(.20),h:5},{x:p(.45),y:t2+8,w:p(.10),h:5},{x:p(.70),y:t2-4,w:p(.22),h:5}]},
{name:'火山',bg1:'#1a0a00',bg2:'#2d1500',platColor:'#6a4020',floorColor:'#4a2a10',accent:'#ff6b35',decorType:'volcano',platforms:[{x:p(.05),y:t1+8,w:p(.12),h:5},{x:p(.22),y:t1-5,w:p(.20),h:5},{x:p(.58),y:t1,w:p(.10),h:5},{x:p(.78),y:t1+10,w:p(.16),h:5},{x:p(.02),y:t2+6,w:p(.16),h:5},{x:p(.35),y:t2,w:p(.14),h:5},{x:p(.62),y:t2+4,w:p(.08),h:5},{x:p(.80),y:t2-2,w:p(.15),h:5}]},
{name:'冰原',bg1:'#0a1628',bg2:'#152238',platColor:'#5588aa',floorColor:'#446688',accent:'#00d4ff',decorType:'snow',platforms:[{x:p(.04),y:t1,w:p(.22),h:5},{x:p(.40),y:t1-8,w:p(.07),h:5},{x:p(.60),y:t1+6,w:p(.15),h:5},{x:p(.84),y:t1,w:p(.12),h:5},{x:p(.12),y:t2+5,w:p(.18),h:5},{x:p(.50),y:t2,w:p(.24),h:5},{x:p(.82),y:t2+8,w:p(.10),h:5}]},
{name:'竹林',bg1:'#0a1a0a',bg2:'#142814',platColor:'#3a6630',floorColor:'#2a4a20',accent:'#88dd44',decorType:'bamboo',platforms:[{x:p(.06),y:t1-4,w:p(.10),h:5},{x:p(.24),y:t1+8,w:p(.16),h:5},{x:p(.50),y:t1-6,w:p(.12),h:5},{x:p(.75),y:t1+3,w:p(.20),h:5},{x:p(.08),y:t2,w:p(.14),h:5},{x:p(.38),y:t2+6,w:p(.08),h:5},{x:p(.58),y:t2-3,w:p(.18),h:5},{x:p(.84),y:t2+4,w:p(.12),h:5}]},
{name:'沙漠',bg1:'#2a1a08',bg2:'#3d2a10',platColor:'#aa8844',floorColor:'#887040',accent:'#ffcc44',decorType:'desert',platforms:[{x:p(.02),y:t1+6,w:p(.18),h:5},{x:p(.28),y:t1-8,w:p(.10),h:5},{x:p(.48),y:t1+2,w:p(.22),h:5},{x:p(.80),y:t1-4,w:p(.15),h:5},{x:p(.10),y:t2-2,w:p(.12),h:5},{x:p(.34),y:t2+8,w:p(.16),h:5},{x:p(.68),y:t2,w:p(.24),h:5}]},
{name:'星空',bg1:'#050510',bg2:'#0a0a20',platColor:'#4444aa',floorColor:'#333366',accent:'#aa88ff',decorType:'space',platforms:[{x:p(.04),y:t1+10,w:p(.14),h:5},{x:p(.26),y:t1-6,w:p(.08),h:5},{x:p(.42),y:t1+4,w:p(.16),h:5},{x:p(.68),y:t1-10,w:p(.10),h:5},{x:p(.86),y:t1+2,w:p(.10),h:5},{x:p(.06),y:t2+4,w:p(.10),h:5},{x:p(.30),y:t2,w:p(.20),h:5},{x:p(.60),y:t2+6,w:p(.12),h:5},{x:p(.80),y:t2-4,w:p(.16),h:5}]}];}
let maps=[];const MAPS_COUNT=6,P_COLORS=['#ff4455','#44aaff'],P_NAMES=['紅方','藍方'];
resize();window.addEventListener('resize',resize);window.addEventListener('orientationchange',()=>{setTimeout(resize,150);});
let gameState='menu',selectedSkins=[0,2],selectedMap=0,selectingPlayer=0,selectedWeapons=[0,0],selectingWeaponPlayer=0,players=[],projectiles=[],particles=[],explosions=[],shakeTimer=0,shakeIntensity=0,flashAlpha=0,msgText='',msgTimer=0,koWinner=-1,restartTimer=0;
function createPlayer(i){const fy=CH-FLOOR_H;return{idx:i,x:i===0?CW*.15:CW*.85,y:fy-22,w:20,h:40,vx:0,vy:0,facing:i===0?1:-1,onGround:true,skin:SKINS[selectedSkins[i]],hp:MAX_HP,alive:true,hurtTimer:0,aimAngle:0,aimDir:1,weaponIdx:selectedWeapons[i],canThrow:true,throwCooldown:0,animFrame:0,deadY:0};}
function initRound(){maps=buildMaps();players=[createPlayer(0),createPlayer(1)];projectiles=[];particles=[];explosions=[];shakeTimer=0;flashAlpha=0;msgText='';msgTimer=0;koWinner=-1;restartTimer=0;}
function startGame(){initRound();gameState='playing';}
function getPlats(){return maps[selectedMap].platforms;}function getFloorY(){return CH-FLOOR_H;}
function updatePlayer(p,dt){if(!p.alive)return;p.vx=p.facing*WALK_SPEED;p.x+=p.vx*dt;if(!p.onGround)p.vy+=GRAVITY*dt;p.y+=p.vy*dt;const fy=getFloorY();if(p.y+p.h/2>=fy){p.y=fy-p.h/2;p.vy=0;p.onGround=true;}if(p.vy>0){for(const pl of getPlats()){const f=p.y+p.h/2,pf=f-p.vy*dt;if(pf<=pl.y&&f>=pl.y&&p.x+p.w/2>pl.x&&p.x-p.w/2<pl.x+pl.w){p.y=pl.y-p.h/2;p.vy=0;p.onGround=true;}}}if(p.onGround&&Math.abs(p.y+p.h/2-fy)>2){let on=false;for(const pl of getPlats()){if(Math.abs(p.y+p.h/2-pl.y)<3&&p.x+p.w/2>pl.x&&p.x-p.w/2<pl.x+pl.w){on=true;break;}}if(!on)p.onGround=false;}const m=p.w/2+2;if(p.x<m){p.x=m;p.facing=1;}if(p.x>CW-m){p.x=CW-m;p.facing=-1;}p.aimAngle+=p.aimDir*AIM_SPEED*dt;if(p.aimAngle>AIM_MAX){p.aimAngle=AIM_MAX;p.aimDir=-1;}if(p.aimAngle<AIM_MIN){p.aimAngle=AIM_MIN;p.aimDir=1;}if(p.throwCooldown>0){p.throwCooldown-=dt;if(p.throwCooldown<=0)p.canThrow=true;}if(p.hurtTimer>0)p.hurtTimer-=dt;p.animFrame+=dt*6;}
function playerJump(i){const p=players[i];if(p&&p.alive&&p.onGround){p.vy=JUMP_VEL;p.onGround=false;}}
function throwWeapon(i){const p=players[i];if(!p||!p.alive||!p.canThrow)return;const w=WEAPONS[p.weaponIdx],dir=p.facing,angle=dir===1?p.aimAngle:Math.PI-p.aimAngle;projectiles.push({x:p.x+dir*14,y:p.y-6,vx:Math.cos(angle)*w.speed,vy:Math.sin(angle)*w.speed,rotation:angle,spinAngle:0,owner:i,type:p.weaponIdx,active:true,trail:[],timer:0,damage:w.damage,gravMul:w.gravity,explosive:w.explosive,fuseTime:w.fuseTime||0,blastRadius:w.blastRadius||0,spin:w.spin});p.canThrow=false;p.throwCooldown=w.cooldown;p.aimAngle=0;p.aimDir=1;}
function updateProjectiles(dt){for(let i=projectiles.length-1;i>=0;i--){const k=projectiles[i];if(!k.active){k.stuckTimer=(k.stuckTimer||0)+dt;if(k.stuckTimer>1.5)projectiles.splice(i,1);continue;}k.timer+=dt;k.vy+=GRAVITY*k.gravMul*dt;k.x+=k.vx*dt;k.y+=k.vy*dt;if(k.spin)k.spinAngle+=dt*15;else k.rotation=Math.atan2(k.vy,k.vx);k.trail.push({x:k.x,y:k.y,life:1});if(k.trail.length>8)k.trail.shift();if(k.explosive&&k.timer>=k.fuseTime){explode(k);projectiles.splice(i,1);continue;}const tgt=players[1-k.owner];if(tgt&&tgt.alive){if(Math.abs(k.x-tgt.x)<tgt.w/2+8&&Math.abs(k.y-tgt.y)<tgt.h/2+6){k.active=false;if(k.explosive){explode(k);projectiles.splice(i,1);}else{hitPlayer(tgt,k.damage);spawnHitParticles(k.x,k.y);}continue;}}const fy=getFloorY();if(k.y>fy){if(k.explosive){explode(k);projectiles.splice(i,1);}else{k.active=false;k.y=fy;spawnSparks(k.x,fy);}continue;}if(k.x<-60||k.x>CW+60){projectiles.splice(i,1);continue;}}}
function explode(k){const r=k.blastRadius||80;for(const p of players){if(!p.alive||p.idx===k.owner)continue;const dx=p.x-k.x,dy=p.y-k.y;if(Math.sqrt(dx*dx+dy*dy)<r)hitPlayer(p,1);}explosions.push({x:k.x,y:Math.min(k.y,getFloorY()),r,timer:0,maxTime:.5});spawnExplosionParticles(k.x,Math.min(k.y,getFloorY()),r);shakeTimer=.4;shakeIntensity=12;flashAlpha=.4;}
function hitPlayer(t,d){t.hp-=d;if(t.hp<0)t.hp=0;t.hurtTimer=.6;if(!shakeTimer){shakeTimer=.25;shakeIntensity=6;flashAlpha=.25;}if(t.hp<=0){t.alive=false;t.deadY=t.y;spawnDeathParticles(t.x,t.y);shakeTimer=.5;shakeIntensity=14;flashAlpha=.5;koWinner=1-t.idx;msgText=`${P_NAMES[koWinner]} 獲勝！`;msgTimer=99;gameState='ko';restartTimer=2;}else{msgText='受傷！';msgTimer=.8;}}
function spawnHitParticles(x,y){for(let i=0;i<16;i++){const a=Math.random()*6.28,s=2+Math.random()*5;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:.025,size:2+Math.random()*3,color:['#ff4444','#ffcc00','#fff'][~~(Math.random()*3)]});}}
function spawnDeathParticles(x,y){for(let i=0;i<30;i++){const a=Math.random()*6.28,s=3+Math.random()*9;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,life:1,decay:.012,size:3+Math.random()*5,color:['#ff4444','#ff8800','#ffcc00','#fff'][~~(Math.random()*4)]});}for(let i=0;i<5;i++){const a=Math.random()*6.28,s=1+Math.random()*2;particles.push({x,y:y-20,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,decay:.008,size:4,color:'#ffee44',star:true});}}
function spawnExplosionParticles(x,y,r){for(let i=0;i<40;i++){const a=Math.random()*6.28,s=2+Math.random()*r*.08;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,decay:.015+Math.random()*.015,size:3+Math.random()*6,color:['#ff4400','#ff8800','#ffcc00','#ffee88'][~~(Math.random()*4)]});}}
function spawnSparks(x,y){for(let i=0;i<6;i++){const a=-Math.PI*Math.random(),s=2+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:.04,size:1+Math.random()*2,color:'#ffcc66',spark:true});}}
function updateParticles(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;if(!p.star)p.vy+=.15;p.life-=p.decay;if(p.life<=0)particles.splice(i,1);}for(let i=explosions.length-1;i>=0;i--){explosions[i].timer+=dt;if(explosions[i].timer>=explosions[i].maxTime)explosions.splice(i,1);}}
const activeTouches={};
document.addEventListener('touchstart',e=>{e.preventDefault();if(CH>CW)return;for(const t of e.changedTouches){const side=t.clientX<CW/2?0:1;activeTouches[t.identifier]={startX:t.clientX,startY:t.clientY,side,moved:false};if(gameState==='menu'){gameState='charSelect';selectingPlayer=0;return;}if(gameState==='ko'){if(restartTimer<=0)gameState='menu';return;}if(gameState==='charSelect'){handleCharTap(t.clientX,t.clientY);return;}if(gameState==='weaponSelect'){handleWeaponTap(t.clientX,t.clientY);return;}if(gameState==='mapSelect'){handleMapTap(t.clientX,t.clientY);return;}}},{passive:false});
document.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){const info=activeTouches[t.identifier];if(info&&!info.moved){const dy=t.clientY-info.startY,dx=t.clientX-info.startX;if(dy<-25){info.moved=true;if(gameState==='playing')playerJump(info.side);}}}},{passive:false});
document.addEventListener('touchend',e=>{e.preventDefault();for(const t of e.changedTouches){const info=activeTouches[t.identifier];if(info&&!info.moved&&gameState==='playing')throwWeapon(info.side);delete activeTouches[t.identifier];}},{passive:false});
let mouseInfo=null;
document.addEventListener('mousedown',e=>{if(CH>CW)return;const side=e.clientX<CW/2?0:1;mouseInfo={startX:e.clientX,startY:e.clientY,side,moved:false};if(gameState==='menu'){gameState='charSelect';selectingPlayer=0;return;}if(gameState==='ko'){if(restartTimer<=0)gameState='menu';return;}if(gameState==='charSelect'){handleCharTap(e.clientX,e.clientY);return;}if(gameState==='weaponSelect'){handleWeaponTap(e.clientX,e.clientY);return;}if(gameState==='mapSelect'){handleMapTap(e.clientX,e.clientY);return;}});
document.addEventListener('mousemove',e=>{if(mouseInfo&&!mouseInfo.moved){const dy=e.clientY-mouseInfo.startY,dx=e.clientX-mouseInfo.startX;if(dy<-25){mouseInfo.moved=true;if(gameState==='playing')playerJump(mouseInfo.side);}}});
document.addEventListener('mouseup',e=>{if(mouseInfo&&!mouseInfo.moved&&gameState==='playing')throwWeapon(mouseInfo.side);mouseInfo=null;});
function handleCharTap(tx,ty){const cw=Math.min(CW*.20,110),gap=16,tw=SKINS.length*cw+(SKINS.length-1)*gap,sx=(CW-tw)/2,cy=CH*.25,ch=CH*.48;for(let i=0;i<SKINS.length;i++){const cx=sx+i*(cw+gap);if(tx>=cx&&tx<=cx+cw&&ty>=cy&&ty<=cy+ch){selectedSkins[selectingPlayer]=i;selectingPlayer===0?selectingPlayer=1:(gameState='weaponSelect',selectingWeaponPlayer=0);return;}}}
function handleMapTap(tx,ty){maps=buildMaps();const cw=Math.min(CW*.14,95),gap=8,tw=MAPS_COUNT*cw+(MAPS_COUNT-1)*gap,sx=(CW-tw)/2,cy=CH*.22,ch=CH*.52;for(let i=0;i<MAPS_COUNT;i++){const cx=sx+i*(cw+gap);if(tx>=cx&&tx<=cx+cw&&ty>=cy&&ty<=cy+ch){selectedMap=i;startGame();return;}}}
function handleWeaponTap(tx,ty){const cw=Math.min(CW*.20,110),gap=16,tw=WEAPONS.length*cw+(WEAPONS.length-1)*gap,sx=(CW-tw)/2,cy=CH*.25,ch=CH*.48;for(let i=0;i<WEAPONS.length;i++){const cx=sx+i*(cw+gap);if(tx>=cx&&tx<=cx+cw&&ty>=cy&&ty<=cy+ch){selectedWeapons[selectingWeaponPlayer]=i;if(selectingWeaponPlayer===0){selectingWeaponPlayer=1;}else{gameState='mapSelect';}return;}}}
function drawWeaponSelect(){const g=ctx.createRadialGradient(CW/2,CH/2,0,CW/2,CH/2,Math.max(CW,CH)*.6);g.addColorStop(0,'#1a1a2e');g.addColorStop(1,'#0b0b12');ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);ctx.textAlign='center';ctx.textBaseline='middle';const pc=P_COLORS[selectingWeaponPlayer];ctx.font=`700 ${Math.min(CW*.032,18)}px Noto Sans TC,sans-serif`;ctx.fillStyle=pc;ctx.shadowColor=pc;ctx.shadowBlur=6;ctx.fillText(`${P_NAMES[selectingWeaponPlayer]} 選擇武器`,CW/2,CH*.12);ctx.shadowBlur=0;const cw2=Math.min(CW*.20,110),gap2=16,tw2=WEAPONS.length*cw2+(WEAPONS.length-1)*gap2,sx2=(CW-tw2)/2,cy2=CH*.25,ch2=CH*.48;for(let i=0;i<WEAPONS.length;i++){const cx=sx2+i*(cw2+gap2),w=WEAPONS[i];ctx.fillStyle='rgba(255,255,255,.04)';ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(cx,cy2,cw2,ch2,8);ctx.fill();ctx.stroke();ctx.font='30px sans-serif';ctx.fillText(w.icon,cx+cw2/2,cy2+ch2*.35);ctx.font=`700 ${Math.min(CW*.02,12)}px Noto Sans TC,sans-serif`;ctx.fillStyle='#fff';ctx.fillText(w.name,cx+cw2/2,cy2+ch2*.58);ctx.font=`400 ${Math.min(CW*.015,9)}px Noto Sans TC,sans-serif`;ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillText('傷害:'+w.damage+' CD:'+w.cooldown+'s',cx+cw2/2,cy2+ch2*.72);if(w.explosive)ctx.fillText('範圍爆炸',cx+cw2/2,cy2+ch2*.84);}ctx.textBaseline='alphabetic';}

ctx.fillStyle=`rgba(220,235,255,${.12+Math.sin(t*.4+i)*.08})`;ctx.beginPath();ctx.arc(sx2,sy2,Math.max(.4,1.5+Math.sin(t+i)*.8),0,6.28);ctx.fill();}

ctx.strokeStyle=`rgba(60,${130+i*8},30,.12)`;ctx.beginPath();ctx.moveTo(bx,CH-FLOOR_H);

ctx.fillStyle=`rgba(200,255,80,${glow})`;const fx=(i*110+Math.sin(t*.8+i)*50)%CW,fy=30+Math.sin(t*.5+i*1.7)*100+i*15;

else if(map.decorType==='desert'){

ctx.fillStyle='rgba(255,220,100,.04)';ctx.beginPath();ctx.arc(sunX,sunY,60,0,6.28);ctx.fill();
for(let i=0;i<8;i++){const a=i*Math.PI/4+t*.1;ctx.strokeStyle='rgba(255,220,100,.04)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(sunX+Math.cos(a)*35,sunY+Math.sin(a)*35);ctx.lineTo(sunX+Math.cos(a)*55,sunY+Math.sin(a)*55);ctx.stroke();}
// Sand dunes (layered)
for(let i=0;i<4;i++){ctx.fillStyle=`rgba(180,140,80,${.03+i*.008})`;ctx.beginPath();ctx.moveTo(0,CH-FLOOR_H+5);for(let x=0;x<=CW;x+=8)ctx.lineTo(x,CH-FLOOR_H-10-i*6+Math.sin(x*.006+i*.7)*15+Math.sin(x*.015+i)*8);ctx.lineTo(CW,CH);ctx.lineTo(0,CH);ctx.fill();}
// Cacti (detailed)
for(let i=0;i<3;i++){const cx2=CW*(.18+i*.32),cy2=CH-FLOOR_H-4;ctx.fillStyle='rgba(50,90,30,.15)';ctx.beginPath();ctx.roundRect(cx2-4,cy2-30,8,30,3);ctx.fill();ctx.beginPath();ctx.roundRect(cx2+4,cy2-24,14,5,2);ctx.fill();ctx.beginPath();ctx.roundRect(cx2+14,cy2-30,5,11,2);ctx.fill();ctx.beginPath();ctx.roundRect(cx2-16,cy2-18,14,5,2);ctx.fill();ctx.beginPath();ctx.roundRect(cx2-16,cy2-28,5,14,2);ctx.fill();}
// Heat shimmer
ctx.globalAlpha=.02;for(let y=CH*.3;y<CH-FLOOR_H;y+=3){ctx.fillStyle='#fff';ctx.fillRect(0,y+Math.sin(y*.05+t*3)*.8,CW,.5);}ctx.globalAlpha=1;

for(let i=0;i<2;i++){const twx=(t*40+i*400)%CW,twy=CH-FLOOR_H-10;ctx.strokeStyle='rgba(150,120,60,.1)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(twx,twy,5+i*2,0,6.28);ctx.stroke();}}
else if(map.decorType==='space'){
// Dense star field
for(let i=0;i<60;i++){const bright=.08+Math.sin(t*1.5+i*.7)*.12;ctx.fillStyle=`rgba(255,255,255,${bright})`;
ctx.beginPath();ctx.arc((i*47+Math.sin(i)*10)%CW,(i*31+Math.cos(i)*10)%CH,Math.max(.2,.6+Math.sin(t+i)*.4),0,6.28);ctx.fill();}

for(let i=0;i<8;i++){const cols=['#ff8888','#88aaff','#ffdd88','#88ffaa'];ctx.fillStyle=cols[i%4].replace(')',`,${.08+Math.sin(t+i)*.05})`).replace('rgb','rgba');
ctx.beginPath();ctx.arc((i*113)%CW,(i*79)%CH,Math.max(.3,1+Math.sin(t*2+i)*.5),0,6.28);ctx.fill();}

ctx.globalAlpha=.05;const ng=ctx.createRadialGradient(CW*.25,CH*.35,0,CW*.25,CH*.35,CW*.35);ng.addColorStop(0,'#ff44aa');ng.addColorStop(.5,'#aa2266');ng.addColorStop(1,'transparent');ctx.fillStyle=ng;ctx.fillRect(0,0,CW,CH);
const ng2=ctx.createRadialGradient(CW*.75,CH*.4,0,CW*.75,CH*.4,CW*.3);ng2.addColorStop(0,'#4488ff');ng2.addColorStop(.5,'#2244aa');ng2.addColorStop(1,'transparent');ctx.fillStyle=ng2;ctx.fillRect(0,0,CW,CH);
const ng3=ctx.createRadialGradient(CW*.5,CH*.7,0,CW*.5,CH*.7,CW*.2);ng3.addColorStop(0,'#44ff88');ng3.addColorStop(1,'transparent');ctx.fillStyle=ng3;ctx.fillRect(0,0,CW,CH);ctx.globalAlpha=1;
// Shooting stars (multiple)
for(let i=0;i<2;i++){const ss=((t*.3+i*1.5)%4);if(ss<.4){const a=.7+i*.3;ctx.strokeStyle=`rgba(255,255,255,${(1-ss/.4)*.7})`;ctx.lineWidth=1.5;ctx.beginPath();const sx2=CW*(.3+i*.4)+ss*350,sy2=10+ss*120+i*30;ctx.moveTo(sx2,sy2);ctx.lineTo(sx2+25,sy2+8);ctx.stroke();}}
// Distant planet
ctx.globalAlpha=.06;ctx.fillStyle='#6644aa';ctx.beginPath();ctx.arc(CW*.15,CH*.2,18,0,6.28);ctx.fill();
ctx.strokeStyle='rgba(150,100,200,.08)';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(CW*.15,CH*.2,28,6,.3,0,6.28);ctx.stroke();ctx.globalAlpha=1;}
ctx.strokeStyle='rgba(255,255,255,.015)';ctx.lineWidth=1;for(let x=0;x<CW;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}ctx.fillStyle=map.floorColor;ctx.fillRect(0,CH-FLOOR_H,CW,FLOOR_H);ctx.fillStyle=map.accent;ctx.fillRect(0,CH-FLOOR_H,CW,2);for(const pl of getPlats()){ctx.fillStyle=map.platColor;ctx.beginPath();const r=3;ctx.moveTo(pl.x+r,pl.y);ctx.lineTo(pl.x+pl.w-r,pl.y);ctx.quadraticCurveTo(pl.x+pl.w,pl.y,pl.x+pl.w,pl.y+r);ctx.lineTo(pl.x+pl.w,pl.y+pl.h);ctx.lineTo(pl.x,pl.y+pl.h);ctx.lineTo(pl.x,pl.y+r);ctx.quadraticCurveTo(pl.x,pl.y,pl.x+r,pl.y);ctx.closePath();ctx.fill();ctx.fillStyle=map.accent;ctx.fillRect(pl.x+2,pl.y,pl.w-4,1.5);}ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;ctx.setLineDash([3,5]);ctx.beginPath();ctx.moveTo(CW/2,8);ctx.lineTo(CW/2,CH-FLOOR_H-8);ctx.stroke();ctx.setLineDash([]);}
function drawHUD(){const sz=Math.min(CW*.028,16),inset=Math.max(40,CW*.06);ctx.font=`700 ${sz}px Chakra Petch,sans-serif`;ctx.textAlign='left';ctx.fillStyle=P_COLORS[0];ctx.shadowColor=P_COLORS[0];ctx.shadowBlur=4;ctx.fillText(P_NAMES[0],inset,sz+8);ctx.shadowBlur=0;for(let i=0;i<MAX_HP;i++)drawHeart(inset+28+i*11,sz/2+6,i<players[0].hp?'#ff4455':'#333',5);ctx.font='12px sans-serif';ctx.fillText(WEAPONS[players[0].weaponIdx].icon,inset+28+MAX_HP*11+6,sz+6);ctx.font=`700 ${sz}px Chakra Petch,sans-serif`;ctx.textAlign='right';ctx.fillStyle=P_COLORS[1];ctx.shadowColor=P_COLORS[1];ctx.shadowBlur=4;ctx.fillText(P_NAMES[1],CW-inset,sz+8);ctx.shadowBlur=0;for(let i=0;i<MAX_HP;i++)drawHeart(CW-inset-30-i*11,sz/2+6,i<players[1].hp?'#44aaff':'#333',5);ctx.font='12px sans-serif';ctx.textAlign='left';ctx.fillText(WEAPONS[players[1].weaponIdx].icon,CW-inset-30-MAX_HP*11-16,sz+6);ctx.textAlign='center';ctx.font=`400 ${Math.min(8,CW*.013)}px Noto Sans TC,sans-serif`;ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillText('↑跳 · 點擊射擊 · 左紅/右藍',CW/2,CH-5);}
function drawHeart(cx,cy,color,s){ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(cx,cy+s*.3);ctx.bezierCurveTo(cx-s,cy-s*.5,cx-s*.3,cy-s,cx,cy-s*.4);ctx.bezierCurveTo(cx+s*.3,cy-s,cx+s,cy-s*.5,cx,cy+s*.3);ctx.fill();}
function drawMsg(){if(msgTimer<=0)return;const a=Math.min(msgTimer/.3,1);ctx.save();ctx.globalAlpha=Math.min(a,1);ctx.translate(CW/2,CH*.3);ctx.scale(1+(1-a)*.12,1+(1-a)*.12);ctx.font=`900 ${Math.min(CW*.05,28)}px Noto Sans TC,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=10;ctx.fillText(msgText,0,0);ctx.shadowBlur=0;ctx.restore();}
function drawMenuScreen(){const g=ctx.createRadialGradient(CW/2,CH/2,0,CW/2,CH/2,Math.max(CW,CH)*.6);g.addColorStop(0,'#1a1a2e');g.addColorStop(1,'#0b0b12');ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);ctx.textAlign='center';ctx.textBaseline='middle';const ts=Math.min(CW*.08,44);ctx.font=`700 ${ts}px Chakra Petch,sans-serif`;ctx.shadowBlur=18;ctx.shadowColor='#ff4455';ctx.fillStyle='#ff4455';ctx.fillText('飛刀',CW/2-ts,CH*.35);ctx.shadowColor='#44aaff';ctx.fillStyle='#44aaff';ctx.fillText('對決',CW/2+ts,CH*.35);ctx.shadowBlur=0;ctx.font=`700 ${Math.min(CW*.022,12)}px Noto Sans TC,sans-serif`;ctx.fillStyle='rgba(255,255,255,.4)';ctx.fillText('雙人同機 · 即時對戰 · 三種武器',CW/2,CH*.50);ctx.font=`400 ${Math.min(CW*.018,10)}px Noto Sans TC,sans-serif`;ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillText('🗡️飛刀  💣炸彈  🔱標槍',CW/2,CH*.58);const t=performance.now()/1000;ctx.fillStyle=`rgba(255,255,255,${.5+Math.sin(t*3)*.35})`;ctx.font=`700 ${Math.min(CW*.03,15)}px Noto Sans TC,sans-serif`;ctx.fillText('點擊開始',CW/2,CH*.72);ctx.textBaseline='alphabetic';}
function drawCharSelect(){const g=ctx.createRadialGradient(CW/2,CH/2,0,CW/2,CH/2,Math.max(CW,CH)*.6);g.addColorStop(0,'#1a1a2e');g.addColorStop(1,'#0b0b12');ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);ctx.textAlign='center';ctx.textBaseline='middle';const pc=P_COLORS[selectingPlayer];ctx.font=`700 ${Math.min(CW*.032,18)}px Noto Sans TC,sans-serif`;ctx.fillStyle=pc;ctx.shadowColor=pc;ctx.shadowBlur=6;ctx.fillText(`${P_NAMES[selectingPlayer]} 選擇角色`,CW/2,CH*.12);ctx.shadowBlur=0;const cw2=Math.min(CW*.20,110),gap=16,tw=SKINS.length*cw2+(SKINS.length-1)*gap,sx=(CW-tw)/2,cy2=CH*.25,ch2=CH*.48;for(let i=0;i<SKINS.length;i++){const cx=sx+i*(cw2+gap),sk=SKINS[i];ctx.fillStyle='rgba(255,255,255,.04)';ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(cx,cy2,cw2,ch2,8);ctx.fill();ctx.stroke();const px=cx+cw2/2,py=cy2+ch2*.45;ctx.save();ctx.translate(px,py);ctx.scale(.85,.85);ctx.fillStyle=sk.head;ctx.beginPath();ctx.arc(0,-10,12,0,6.28);ctx.fill();ctx.fillStyle=sk.body;ctx.beginPath();ctx.ellipse(0,10,10,12,0,0,6.28);ctx.fill();ctx.fillStyle=sk.accent;ctx.fillRect(-10,8,20,3);ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(-3,-11,3,3.5,0,0,6.28);ctx.fill();ctx.beginPath();ctx.ellipse(5,-11,3,3.5,0,0,6.28);ctx.fill();ctx.fillStyle=sk.eyes;ctx.beginPath();ctx.arc(-2,-10.5,1.8,0,6.28);ctx.fill();ctx.beginPath();ctx.arc(6,-10.5,1.8,0,6.28);ctx.fill();ctx.fillStyle=sk.blush;ctx.beginPath();ctx.ellipse(-8,-8,3,1.8,0,0,6.28);ctx.fill();ctx.beginPath();ctx.ellipse(8,-8,3,1.8,0,0,6.28);ctx.fill();if(sk.hat==='bandana'){ctx.fillStyle=sk.ear;ctx.beginPath();ctx.moveTo(-8,-18);ctx.lineTo(-12,-30);ctx.lineTo(-2,-20);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(8,-18);ctx.lineTo(12,-30);ctx.lineTo(2,-20);ctx.closePath();ctx.fill();}else if(sk.hat==='helmet'){ctx.fillStyle=sk.ear;ctx.save();ctx.translate(-5,-22);ctx.rotate(-.1);ctx.beginPath();ctx.ellipse(0,0,4,12,0,0,6.28);ctx.fill();ctx.restore();ctx.save();ctx.translate(5,-22);ctx.rotate(.1);ctx.beginPath();ctx.ellipse(0,0,4,12,0,0,6.28);ctx.fill();ctx.restore();}else{ctx.fillStyle=sk.ear;ctx.beginPath();ctx.arc(-8,-18,5,0,6.28);ctx.fill();ctx.beginPath();ctx.arc(8,-18,5,0,6.28);ctx.fill();}ctx.restore();ctx.font=`700 ${Math.min(CW*.02,12)}px Noto Sans TC,sans-serif`;ctx.fillStyle='#fff';ctx.fillText(sk.name,cx+cw2/2,cy2+ch2-10);}ctx.textBaseline='alphabetic';}
function drawMapSelect(){maps=buildMaps();const g=ctx.createRadialGradient(CW/2,CH/2,0,CW/2,CH/2,Math.max(CW,CH)*.6);g.addColorStop(0,'#1a1a2e');g.addColorStop(1,'#0b0b12');ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=`700 ${Math.min(CW*.032,18)}px Noto Sans TC,sans-serif`;ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=6;ctx.fillText('選擇地圖',CW/2,CH*.10);ctx.shadowBlur=0;const cw2=Math.min(CW*.14,95),gap=8,tw=MAPS_COUNT*cw2+(MAPS_COUNT-1)*gap,sx=(CW-tw)/2,cy2=CH*.22,ch2=CH*.52;for(let i=0;i<MAPS_COUNT;i++){const cx=sx+i*(cw2+gap),map=maps[i];const mg=ctx.createLinearGradient(cx,cy2,cx,cy2+ch2);mg.addColorStop(0,map.bg1);mg.addColorStop(1,map.bg2);ctx.fillStyle=mg;ctx.beginPath();ctx.roundRect(cx,cy2,cw2,ch2,6);ctx.fill();ctx.strokeStyle=map.accent;ctx.lineWidth=1.5;ctx.stroke();const sx2=cw2/CW,sy2=ch2/CH;for(const pl of map.platforms){ctx.fillStyle=map.platColor;ctx.fillRect(cx+pl.x*sx2,cy2+pl.y*sy2,Math.max(3,pl.w*sx2),2);ctx.fillStyle=map.accent;ctx.fillRect(cx+pl.x*sx2,cy2+pl.y*sy2,Math.max(3,pl.w*sx2),1);}ctx.fillStyle=map.floorColor;ctx.fillRect(cx+2,cy2+ch2-6,cw2-4,4);ctx.font=`700 ${Math.min(CW*.017,10)}px Noto Sans TC,sans-serif`;ctx.fillStyle='#fff';ctx.fillText(map.name,cx+cw2/2,cy2+ch2+12);}ctx.textBaseline='alphabetic';}
function drawKOScreen(){ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,0,CW,CH);ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=`700 ${Math.min(CW*.06,34)}px Chakra Petch,sans-serif`;ctx.shadowColor=P_COLORS[koWinner];ctx.shadowBlur=18;ctx.fillStyle=P_COLORS[koWinner];ctx.fillText(`${P_NAMES[koWinner]} 獲勝！`,CW/2,CH*.38);ctx.shadowBlur=0;if(restartTimer<=0){const t=performance.now()/1000;ctx.font=`700 ${Math.min(CW*.025,13)}px Noto Sans TC,sans-serif`;ctx.fillStyle=`rgba(255,255,255,${.5+Math.sin(t*3)*.3})`;ctx.fillText('點擊回到主選單',CW/2,CH*.55);}ctx.textBaseline='alphabetic';}
function drawStar(cx,cy,r,color){ctx.fillStyle=color;ctx.beginPath();for(let i=0;i<5;i++){const a=6.28*i/5-Math.PI/2,a2=a+Math.PI/5;ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);ctx.lineTo(cx+Math.cos(a2)*r*.4,cy+Math.sin(a2)*r*.4);}ctx.closePath();ctx.fill();}
let prevTime=performance.now();
function loop(now){const dt=Math.min((now-prevTime)/1000,.05);prevTime=now;CW=window.innerWidth;CH=window.innerHeight;if(gameState==='playing'){for(const p of players)updatePlayer(p,dt);updateProjectiles(dt);updateParticles(dt);if(shakeTimer>0)shakeTimer-=dt;if(flashAlpha>0)flashAlpha-=dt*1.5;if(msgTimer>0&&msgTimer<90)msgTimer-=dt;for(const k of projectiles)for(const tr of k.trail)tr.life-=.1;}if(gameState==='ko'){updateParticles(dt);if(shakeTimer>0)shakeTimer-=dt;if(flashAlpha>0)flashAlpha-=dt*1.2;if(restartTimer>0)restartTimer-=dt;}if(CH>CW){ctx.fillStyle='#0b0b12';ctx.fillRect(0,0,CW,CH);ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='50px sans-serif';ctx.fillStyle='#fff';ctx.fillText('📱',CW/2,CH/2-30);ctx.font='bold 16px Noto Sans TC,sans-serif';ctx.fillStyle='rgba(255,255,255,.7)';ctx.fillText('請橫放手機開始遊戲',CW/2,CH/2+25);requestAnimationFrame(loop);return;}ctx.save();if(shakeTimer>0)ctx.translate((Math.random()-.5)*shakeIntensity*2,(Math.random()-.5)*shakeIntensity*2);if(gameState==='menu')drawMenuScreen();else if(gameState==='charSelect')drawCharSelect();else if(gameState==='weaponSelect')drawWeaponSelect();else if(gameState==='mapSelect')drawMapSelect();else if(gameState==='playing'||gameState==='ko'){drawMap();for(const k of projectiles)if(!k.active)drawProjectile(k);for(const p of players)if(p.alive)drawQChar(p);else drawDeadChar(p);if(gameState==='playing')for(const p of players)drawAim(p);for(const k of projectiles){if(k.active){for(const tr of k.trail){if(tr.life>0){ctx.fillStyle=`rgba(255,200,100,${Math.max(0,tr.life)*.4})`;ctx.beginPath();ctx.arc(tr.x,tr.y,Math.max(.1,2*tr.life),0,6.28);ctx.fill();}}drawProjectile(k);}}for(const ex of explosions){const prog=ex.timer/ex.maxTime;ctx.globalAlpha=(1-prog)*.6;const eg=ctx.createRadialGradient(ex.x,ex.y,0,ex.x,ex.y,ex.r*prog);eg.addColorStop(0,'rgba(255,200,50,.8)');eg.addColorStop(.5,'rgba(255,100,0,.4)');eg.addColorStop(1,'transparent');ctx.fillStyle=eg;ctx.beginPath();ctx.arc(ex.x,ex.y,ex.r*(.3+prog*.7),0,6.28);ctx.fill();ctx.globalAlpha=1;}for(const p of particles){ctx.globalAlpha=Math.max(0,p.life);if(p.spark){ctx.strokeStyle=p.color;ctx.lineWidth=p.size;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.vx*2,p.y-p.vy*2);ctx.stroke();}else if(p.star){drawStar(p.x,p.y,Math.max(.1,p.size),p.color);}else{ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.1,p.size*p.life),0,6.28);ctx.fill();}ctx.globalAlpha=1;}if(flashAlpha>0){ctx.fillStyle=`rgba(255,255,255,${Math.max(0,flashAlpha)})`;ctx.fillRect(0,0,CW,CH);}drawHUD();drawMsg();if(gameState==='ko')drawKOScreen();}ctx.restore();requestAnimationFrame(loop);}
